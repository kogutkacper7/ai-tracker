{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-10">

        <div class="card">
            <div class="card-body p-5">

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold text-primary mb-0">Baza Modeli AI</h2>
                    <a href="{% url 'core:train_model-create' %}" class="btn btn-primary btn-lg px-4 shadow-sm">
                        + Dodaj nowy model
                    </a>
                </div>

                <div class="bg-light p-4 rounded-3 mb-4 border">
                    <form action="" method="get" class="d-flex gap-3">
                        <input type="text" class="form-control form-control-lg" value="{{ search_value }}" placeholder="Wpisz nazwę modelu..." name="search">
                        <button type="submit" class="btn btn-dark btn-lg px-5">Szukaj</button>
                    </form>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Nazwa Modelu</th>
                                <th class="text-end">Akcje</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for train_model in train_models %}
                                <tr>
                                    <td class="fw-medium fs-5 py-3">{{ train_model.name }}</td>
                                    <td class="text-end">
                                        <a href="{% url 'core:train-model-detail' train_model.pk %}" class="btn btn-outline-secondary btn-sm px-3">Szczegóły</a>
                                    </td>
                                </tr>
                            {% empty %}
                                <tr>
                                    <td colspan="2" class="text-center py-5 text-muted">
                                        <span class="fs-5">Nie znaleziono modeli dla hasła: <strong>"{{ search_value }}"</strong></span>
                                    </td>
                                </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>

            </div>
        </div>

    </div>
</div>
{% endblock %}
