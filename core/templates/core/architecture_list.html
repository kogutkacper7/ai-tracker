{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-10">

        <div class="card shadow-sm border-0">
            <div class="card-body p-4">

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold text-info mb-0">🧠 AI Architectures</h2>
                </div>

                <div class="bg-light p-3 rounded-3 mb-4 border">
                    <form action="" method="get" class="d-flex gap-3">
                        <input type="text" class="form-control form-control-lg" name="search" placeholder="Search for architectures (e.g. Transformer, CNN)..." value="{{ search_value|default_if_none:'' }}">
                        <button type="submit" class="btn btn-dark btn-lg px-4">Search</button>
                    </form>
                </div>

                <div class="list-group">
                    {% for architecture in architectures %}
                        <div class="list-group-item list-group-item-action d-flex justify-content-between align-items-center py-3 border-start-0 border-end-0">

                            <div class="d-flex align-items-center gap-3">
                                <div class="bg-info bg-opacity-10 text-info rounded d-flex justify-content-center align-items-center" style="width: 45px; height: 45px; font-size: 1.5rem;">
                                    🏗️
                                </div>
                                <span class="fw-medium fs-5 text-dark">{{ architecture.name }}</span>
                            </div>

                            <a href="{% url 'core:architecture-detail' architecture.pk %}" class="btn btn-sm btn-outline-info px-3 rounded-pill">
                                Show details
                            </a>
                        </div>
                    {% empty %}
                        <div class="text-center py-5 text-muted">
                            <div class="fs-1 mb-3">📂</div>
                            <p class="mb-0 fs-5">No architectures found for: <strong>"{{ search_value }}"</strong></p>
                            <a href="?" class="text-decoration-none mt-2 d-inline-block">Wyczyść wyszukiwanie</a>
                        </div>
                    {% endfor %}
                </div>

            </div>
        </div>

    </div>
</div>
{% endblock %}
