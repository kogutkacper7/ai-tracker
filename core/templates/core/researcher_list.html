{% extends 'core/index.html' %}

{% block content %}
  <h1>Researchers List</h1>
  <form action="" method="get">
    {% csrf_token %}
    <input type="text" name="search" placeholder="Search for researcher" value="{{search_value}}">
    <button type="submit">Search</button>
  </form>
    <ul>
      {% for researcher in researchers %}
        <li><a href="{% url 'core:researcher-detail' researcher.pk %}">{{ researcher.username}}</a></li>
      {% endfor %}
    </ul>
{% endblock %}
