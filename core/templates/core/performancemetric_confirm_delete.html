{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow border-0 rounded-4">
                <div class="card-body p-4 p-md-5 text-center">
                    <div class="mb-4">
                        <i class="bi bi-exclamation-triangle text-danger" style="font-size: 3rem;"></i>
                    </div>

                    <h2 class="fw-bold mb-3">Confirm Delete</h2>
                    <p class="text-muted mb-4">
                        Are you sure you want to delete this metric? This action cannot be undone.
                    </p>

                    <form method="post">
                        {% csrf_token %}
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-danger btn-lg rounded-pill shadow-sm">
                                Yes, Delete Metric
                            </button>
                            <a href="{% url 'core:train-model-detail' object.trained_model.pk %}"
                               class="btn btn-light btn-lg rounded-pill mt-2">
                                Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
