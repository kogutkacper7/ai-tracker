{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow border-0 rounded-3">
                <div class="card-body p-4 p-md-5">
                    <h2 class="text-center fw-bold mb-4">Create an Account 👨‍🔬</h2>
                    <p class="text-muted text-center mb-4">Join the AI Tracker community</p>

                    <form action="" method="post" novalidate>
                        {% csrf_token %}
                        <div class="mb-3">
                            {{ form.as_p }}
                        </div>

                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-primary btn-lg rounded-pill shadow-sm">
                                Register Now
                            </button>
                        </div>
                    </form>

                    <hr class="my-4 text-muted">

                    <div class="text-center">
                        <p class="mb-0 text-muted">Already have an account?</p>
                        <a href="{% url 'core:login' %}" class="btn btn-link text-decoration-none">Log in here</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
