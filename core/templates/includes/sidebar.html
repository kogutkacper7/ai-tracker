<div class="d-flex flex-column flex-shrink-0 p-3 bg-white h-100 shadow-sm">
    <span class="fs-5 fw-bold text-dark mb-4 px-2 border-bottom pb-2">Menu</span>

    <ul class="nav nav-pills flex-column mb-auto gap-1">
        <li class="nav-item">
            <a href="{% url 'core:index' %}" class="nav-link {% if request.resolver_match.url_name == 'index' %}active text-white{% else %}text-dark{% endif %} p-2">
                🏠 <span class="ms-2">Dashboard</span>
            </a>
        </li>
        <li>
            <a href="{% url 'core:researcher-list' %}" class="nav-link {% if 'researcher' in request.path %}active text-white{% else %}text-dark{% endif %} p-2">
                👨‍🔬 <span class="ms-2">Researchers</span>
            </a>
        </li>
        <li>
            <a href="{% url 'core:train_model-list' %}" class="nav-link {% if 'train_model' in request.path %}active text-white{% else %}text-dark{% endif %} p-2">
                🤖 <span class="ms-2">Train Models</span>
            </a>
        </li>
        <li>
            <a href="{% url 'core:architecture-list' %}" class="nav-link {% if 'architecture' in request.path %}active text-white{% else %}text-dark{% endif %} p-2">
                🏗️ <span class="ms-2">Architecture</span>
            </a>
        </li>
    </ul>

    <div class="mt-auto border-top pt-3">
        {% if user.is_authenticated %}
            <small class="text-muted d-block px-2">Logged as: <strong>{{ user.username }}</strong></small>
            <form action="{% url 'core:logout' %}" method="post" class="mt-2">
                {% csrf_token %}
                <button type="submit" class="btn btn-sm btn-outline-danger w-100">Logout</button>
            </form>
        {% else %}
            <a href="{% url 'core:login' %}" class="btn btn-sm btn-primary w-100 mb-2">Login</a>
        {% endif %}
    </div>
</div>
